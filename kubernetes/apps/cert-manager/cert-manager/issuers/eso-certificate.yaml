---
# yaml-language-server: $schema=https://raw.githubusercontent.com/cert-manager/cert-manager/release-1.12/deploy/crds/cert-manager.io_certificates.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eso-selfsigned-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: eso-selfsigned-ca
  subject:
    organizations:
    - "${PUBLIC_DOMAIN}"
  secretName: eso-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
