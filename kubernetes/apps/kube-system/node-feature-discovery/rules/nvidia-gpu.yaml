---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: nvidia-gpu
spec:
  rules:
    - name: nvidia.gpu
      labels:
        "nvidia.feature.node.kubernetes.io/gpu": "true"
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            vendor_id: { op: In, value: ["10DE"] } # NVIDIA Corporation
            product_id: { op: In, value: ["1bb3"] } # GP104GL [Tesla P4]