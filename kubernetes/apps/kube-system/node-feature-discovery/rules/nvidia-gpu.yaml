---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: nvidia-gpu
spec:
  rules:
    - name: nvidia.gpu
      labels:
        "nvidia.feature.node.kubernetes.io/gpu": "true"
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            - key: vendor
              op: In
              values: ["0x10de"] # NVIDIA Corporation
            - key: device
              op: In
              values: ["0x1bb3"] # GP104GL [Tesla P4]