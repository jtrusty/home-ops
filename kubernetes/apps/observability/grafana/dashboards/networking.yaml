---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: networking
spec:
  title: Networking
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: coredns-dashboard
spec:
  folderRef:
    name: networking
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  configMapRef:
    name: kube-prometheus-stack-k8s-coredns
    key: k8s-coredns.json