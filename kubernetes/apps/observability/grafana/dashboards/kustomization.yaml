---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: grafana-dashboards
    behavior: create
    literals: []
    files:
      - truenas-scale.json=resources/truenas-scale.json
      - cloudnative-pg.json=resources/cloudnative-pg.json
resources:
  # - ./cilium-dashboard.yaml
  # - ./cloudnative-pg-dashboard.yaml
  # - ./external-secrets-dashboard.yaml
  # - ./prometheus-dashboard.yaml
  # - ./truenas-dashboard.yaml
  - ./networking.yaml
  - ./observability.yaml
  - ./kubernetes.yaml
generatorOptions:
  disableNameSuffixHash: true