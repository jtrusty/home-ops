---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app rook-ceph
  namespace: &namespace storage
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 1h
  dependsOn:
    - name: external-secrets-store
      namespace: security
  path: ./kubernetes/apps/storage/rook-ceph/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace
  healthCheckExprs:

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rook-ceph-external-cluster
  namespace: &namespace storage
spec:
  interval: 1h
  dependsOn:
    - name: rook-ceph
      namespace: *namespace
    - name: external-secrets-store
      namespace: security
  path: ./kubernetes/apps/storage/rook-ceph/external-cluster
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  healthChecks:
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      name: external-cluster
      namespace: *namespace
    - apiVersion: storage.k8s.io/v1
      kind: StorageClass
      name: rook-ceph-rbd-external-cluster
    - apiVersion: storage.k8s.io/v1
      kind: StorageClass
      name: rook-ceph-cephfs-external-cluster
  healthCheckExprs:
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')