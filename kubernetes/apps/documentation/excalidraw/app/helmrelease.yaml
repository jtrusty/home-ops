---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: excalidraw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: excalidraw
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: cloudflare-tunnel
      namespace: network
  values:
    controllers:
      excalidraw:
        strategy: RollingUpdate

        initContainers:
          perms:
            image:
              repository: busybox
              tag: "1.36"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              readOnlyRootFilesystem: false
              allowPrivilegeEscalation: false
              capabilities:
                add: ["CHOWN"]
            command: ["sh", "-c"]
            args:
              - >
                mkdir -p /var/cache/nginx/client_temp /var/run/nginx &&
                chown -R 101:101 /var/cache/nginx /tmp &&
                chmod -R 775 /var/cache/nginx /tmp

        containers:
          app:
            image:
              repository: excalidraw/excalidraw
              tag: latest@sha256:b5b9454af5f9c4403ea3b8ef06f2a3e29ac68e79e7d457f373f4d4a4b603d4bc
            env:
              TZ: "America/Chicago"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 80
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              runAsNonRoot: true
              # nginx user
              runAsUser: 101
              runAsGroup: 101
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 200M

    defaultPodOptions:
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        ports:
          http:
            port: *port

    serviceMonitor:
      app:
        endpoints:
          - port: http

    route:
      app:
        annotations:
          # Homepage Automatic Service Discovery
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Excalidraw"
          gethomepage.dev/description: "whiteboard tool"
          gethomepage.dev/icon: "sh-excalidraw"
          gethomepage.dev/group: "Default"
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
        nginx-cache:
          type: emptyDir
          medium: Memory
          sizeLimit: 128Mi
          globalMounts:
            - path: /var/cache/nginx
        nginx-run:
          type: emptyDir
          globalMounts:
            - path: /var/run
        tmp:
          type: emptyDir
          globalMounts:
            - path: /tmp