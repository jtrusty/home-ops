---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chartdb
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: chartdb
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: cloudflare-tunnel
      namespace: network
  values:
    controllers:
      chartdb:
        strategy: RollingUpdate

        initContainers:
          copy-nginx-conf:
            image:
              repository: ghcr.io/chartdb/chartdb
              tag: 1.16.0@sha256:a0cd415e34ae4f018f78cc469d2269475c4325d7cf84e0f6cc3dc2b436ea54c5
            command:
              - sh
              - -c
              - |
                cp -a /etc/nginx/conf.d/* /nginx-conf/ && chown -R 101:101 /nginx-conf/
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false

        containers:
          app:
            image:
              repository: ghcr.io/chartdb/chartdb
              tag: 1.16.0@sha256:a0cd415e34ae4f018f78cc469d2269475c4325d7cf84e0f6cc3dc2b436ea54c5
            env:
              TZ: "America/Chicago"
              # Optional: Uncomment and configure if you want AI features
              # OPENAI_API_KEY: "your-openai-api-key"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 80
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              runAsNonRoot: true
              # nginx user
              runAsUser: 101
              runAsGroup: 101
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 128M

    defaultPodOptions:
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        ports:
          http:
            port: &port 80
            targetPort: 80

    serviceMonitor:
      app:
        endpoints:
          - port: http

    route:
      app:
        annotations:
          # Homepage Automatic Service Discovery
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "chartdb"
          gethomepage.dev/description: "database diagramming tool"
          gethomepage.dev/icon: "sh-chartdb"
          gethomepage.dev/group: "Default"
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      nginx-cache:
        type: emptyDir
        globalMounts:
          - path: /var/cache/nginx
      nginx-conf:
        type: emptyDir
        globalMounts:
          - path: /etc/nginx/conf.d
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
