!
router bgp 64513
bgp router-id 192.168.1.1
no bgp ebgp-requires-policy
!
neighbor k8s peer-group
neighbor 10.10.16.141 peer-group k8s
neighbor 10.10.16.142 peer-group k8s
neighbor 10.10.16.143 peer-group k8s
neighbor 10.10.16.144 peer-group k8s
neighbor 10.10.16.145 peer-group k8s
neighbor 10.10.16.146 peer-group k8s
neighbor k8s remote-as 64514
!
address-family ipv4 unicast
  neighbor k8s activate
  neighbor k8s send-community all
  neighbor k8s soft-reconfiguration inbound
exit-address-family
!